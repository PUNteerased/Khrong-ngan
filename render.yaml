# Render Blueprint — https://render.com/docs/blueprint-spec
# สร้าง PostgreSQL ใน Dashboard แล้วตั้ง DATABASE_URL + secrets ใน Environment ของ service นี้
services:
  - type: web
    name: laneya-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
